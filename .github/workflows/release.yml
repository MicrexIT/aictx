name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN to a token with write access to aictx/homebrew-tap."
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: aictx/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm Trusted Publishing runtime
        run: npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: package
        run: |
          node -e 'const pkg = require("./package.json"); console.log(`version=${pkg.version}`);' >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          node -e 'const pkg = require("./package.json"); const tag = process.env.GITHUB_REF_NAME; const expected = `v${pkg.version}`; if (tag !== expected) { throw new Error(`Tag ${tag} does not match ${expected}`); }'

      - name: Verify package
        run: pnpm test:local

      - name: Build docs and site
        run: |
          pnpm build:docs
          pnpm build:site

      - name: Publish with provenance
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@aictx/memory@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "@aictx/memory@${PACKAGE_VERSION} is already published; skipping npm publish."
            exit 0
          fi

          npm publish --access public --provenance

      - name: Render Homebrew formula
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          tarball_url="https://registry.npmjs.org/@aictx/memory/-/memory-${PACKAGE_VERSION}.tgz"

          for attempt in {1..12}; do
            if curl -fsSL "$tarball_url" -o package.tgz; then
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "::error::npm tarball did not become available: $tarball_url"
              exit 1
            fi

            sleep 10
          done

          sha256="$(sha256sum package.tgz | awk '{print $1}')"
          node scripts/render-homebrew-formula.mjs --version "$PACKAGE_VERSION" --sha256 "$sha256" > memory.rb

      - name: Publish Homebrew formula
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          mkdir -p homebrew-tap/Formula
          cp memory.rb homebrew-tap/Formula/memory.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/memory.rb; then
            echo "Homebrew formula already points at ${PACKAGE_VERSION}."
            exit 0
          fi

          git add Formula/memory.rb
          git commit -m "Update memory to ${PACKAGE_VERSION}"
          git push
