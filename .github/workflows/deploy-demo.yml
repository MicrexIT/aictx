name: Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - ".aictx/memory/**"
      - ".aictx/relations/**"
      - ".aictx/config.json"
      - ".github/workflows/deploy-demo.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/build-viewer-demo-data.mjs"
      - "src/viewer/demo-worker.ts"
      - "src/viewer/demo-data.generated.json"
      - "viewer/**"
      - "wrangler.demo.jsonc"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build demo viewer
        run: pnpm build:demo-viewer

      - name: Deploy demo Worker
        run: pnpm deploy:demo:cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
