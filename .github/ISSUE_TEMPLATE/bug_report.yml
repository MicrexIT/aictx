name: Bug report
description: Report a reproducible Aictx problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets or private project memory.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands and a minimal fixture when possible.
      placeholder: |
        1. Run `aictx init`
        2. Run `aictx load "..."`
        3. See error
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste sanitized command output, JSON envelopes, or stack traces.
      render: shell
  - type: input
    id: version
    attributes:
      label: Aictx version
      placeholder: "aictx --version"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP
        - Local viewer
        - Public docs
        - Package/install
        - Other
    validations:
      required: true
