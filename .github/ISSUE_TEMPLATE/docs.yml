name: Documentation
description: Report unclear, missing, or stale documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link the page or name the README/docs section.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Explain what is confusing, missing, or stale.
    validations:
      required: true
