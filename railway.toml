[build]
builder = "RAILPACK"
buildCommand = "npm install -g pnpm@10.11.0 && pnpm build:site"
watchPatterns = [
  "/package.json",
  "/pnpm-lock.yaml",
  "/railway.toml",
  "/scripts/serve-site.mjs",
  "/site/**"
]

[deploy]
startCommand = "node scripts/serve-site.mjs"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
